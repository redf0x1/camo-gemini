<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CamoGemini Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #252836;
      --border: #2e3142;
      --text: #e4e6eb;
      --text-secondary: #8b8fa3;
      --accent: #6c63ff;
      --accent-hover: #7b73ff;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --orange: #fb923c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .container { max-width: 1000px; margin: 0 auto; padding: 24px; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 24px; font-weight: 600; }
    header h1 span { color: var(--accent); }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
    .status-dot.healthy { background: var(--green); }
    .status-dot.degraded { background: var(--yellow); }
    .status-dot.cooldown { background: var(--orange); }
    .status-dot.offline { background: var(--red); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
    .health-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
    .health-item { background: var(--surface2); padding: 16px; border-radius: 8px; }
    .health-item .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .health-item .value { font-size: 20px; font-weight: 600; }
    .account-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--surface2); border-radius: 8px; margin-bottom: 8px; }
    .account-row .info { display: flex; align-items: center; gap: 12px; }
    .account-row .actions { display: flex; gap: 8px; }
    button { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background 0.2s; }
    button:hover { background: var(--accent-hover); }
    button.danger { background: var(--red); }
    button.danger:hover { background: #ef4444; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .add-account { display: flex; gap: 8px; margin-top: 12px; }
    .add-account input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; width: 120px; }
    .chat-area { display: flex; flex-direction: column; gap: 12px; }
    .chat-input { display: flex; gap: 8px; }
    .chat-input input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 14px; }
    .chat-input input:focus { outline: none; border-color: var(--accent); }
    .chat-output { background: var(--surface2); padding: 16px; border-radius: 8px; min-height: 100px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; font-size: 14px; line-height: 1.6; }
    .chat-output.empty { color: var(--text-secondary); font-style: italic; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .tag.active { background: rgba(108,99,255,0.2); color: var(--accent); }
    .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 100; animation: fadeIn 0.3s; }
    .toast.error { background: var(--red); color: white; }
    .toast.success { background: var(--green); color: #000; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { text-align: center; color: var(--text-secondary); font-size: 12px; margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Camo<span>Gemini</span></h1>
      <div id="overall-status"><span class="status-dot offline"></span> Checking...</div>
    </header>

    <div class="card">
      <h2>System Health</h2>
      <div class="health-grid" id="health-grid">
        <div class="health-item"><div class="label">CamoFox</div><div class="value" id="camofox-status">--</div></div>
        <div class="health-item"><div class="label">Accounts</div><div class="value" id="account-count">--</div></div>
        <div class="health-item"><div class="label">Healthy</div><div class="value" id="healthy-count">--</div></div>
        <div class="health-item"><div class="label">Active</div><div class="value" id="active-account">--</div></div>
      </div>
    </div>

    <div class="card">
      <h2>Accounts</h2>
      <div id="account-list"></div>
      <div class="add-account">
        <input type="number" id="new-account-idx" placeholder="Index (0-9)" min="0" max="9">
        <button onclick="addAccount()">Add Account</button>
      </div>
    </div>

    <div class="card">
      <h2>Quick Chat</h2>
      <div class="chat-area">
        <div class="chat-output empty" id="chat-output">Send a message to Gemini...</div>
        <div class="chat-input">
          <input type="text" id="chat-prompt" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChat()">
          <button onclick="sendChat()" id="chat-btn">Send</button>
        </div>
      </div>
    </div>

    <footer>CamoGemini v0.1.0 — IBPE Architecture</footer>
  </div>

  <script>
    const API = '';

    async function fetchHealth() {
      try {
        const res = await fetch(API + '/api/health');
        const data = await res.json();
        document.getElementById('camofox-status').textContent = data.camofoxConnected ? 'Connected' : 'Disconnected';
        document.getElementById('account-count').textContent = data.totalAccounts;
        document.getElementById('healthy-count').textContent = data.healthyAccounts;
        document.getElementById('active-account').textContent = data.activeAccountIndex !== null ? '#' + data.activeAccountIndex : 'None';
        const dot = document.querySelector('#overall-status .status-dot');
        dot.className = 'status-dot ' + data.overall;
        document.querySelector('#overall-status').innerHTML = '';
        document.querySelector('#overall-status').appendChild(dot);
        document.querySelector('#overall-status').append(' ' + data.overall.charAt(0).toUpperCase() + data.overall.slice(1));
        renderAccounts(data.accounts);
      } catch (e) {
        document.getElementById('camofox-status').textContent = 'Error';
      }
    }

    function renderAccounts(accounts) {
      const list = document.getElementById('account-list');
      if (!accounts || accounts.length === 0) {
        list.innerHTML = '<div style="color:var(--text-secondary);padding:12px;">No accounts registered. Add one below.</div>';
        return;
      }
      list.innerHTML = accounts.map(a => `
        <div class="account-row">
          <div class="info">
            <span class="status-dot ${a.health}"></span>
            <strong>Account #${a.accountIndex}</strong>
            ${a.isActive ? '<span class="tag active">Active</span>' : ''}
            <span style="color:var(--text-secondary);font-size:13px;">${a.isLoggedIn ? 'Logged in' : 'Not logged in'}</span>
          </div>
          <div class="actions">
            ${!a.isLoggedIn ? `<button onclick="loginAccount(${a.accountIndex})">Login</button>` : ''}
            ${a.isLoggedIn ? `<button onclick="logoutAccount(${a.accountIndex})">Logout</button>` : ''}
            <button class="danger" onclick="removeAccount(${a.accountIndex})">Remove</button>
          </div>
        </div>
      `).join('');
    }

    async function addAccount() {
      const idx = parseInt(document.getElementById('new-account-idx').value);
      if (isNaN(idx) || idx < 0 || idx > 9) { showToast('Index must be 0-9', 'error'); return; }
      try {
        const res = await fetch(API + `/api/accounts/${idx}/login`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showToast(`Account #${idx} added`, 'success');
        fetchHealth();
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function loginAccount(idx) {
      try {
        const res = await fetch(API + `/api/accounts/${idx}/login`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showToast(`Account #${idx} logged in`, 'success');
        fetchHealth();
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function logoutAccount(idx) {
      try {
        const res = await fetch(API + `/api/accounts/${idx}/logout`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showToast(`Account #${idx} logged out`, 'success');
        fetchHealth();
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function removeAccount(idx) {
      try {
        const res = await fetch(API + `/api/accounts/${idx}`, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showToast(`Account #${idx} removed`, 'success');
        fetchHealth();
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function sendChat() {
      const input = document.getElementById('chat-prompt');
      const output = document.getElementById('chat-output');
      const btn = document.getElementById('chat-btn');
      const prompt = input.value.trim();
      if (!prompt) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>';
      output.classList.remove('empty');
      output.textContent = 'Thinking...';

      try {
        const res = await fetch(API + '/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        output.textContent = data.text || '(no response)';
        input.value = '';
      } catch (e) {
        output.textContent = 'Error: ' + e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send';
      }
    }

    function showToast(msg, type) {
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    fetchHealth();
    setInterval(fetchHealth, 10000);
  </script>
</body>
</html>
